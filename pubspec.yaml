name: flux
description: Flux Flutter app scaffold (offline-first, mock data)
version: 0.1.0
publish_to: 'none'
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^6.0.0
  flutter_riverpod: ^2.1.0
  riverpod: ^2.0.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0
  background_downloader: ^9.5.4
  flutter_svg: ^2.0.0
  google_fonts: ^6.0.0

  path_provider: ^2.1.5
  llamadart: ^0.6.10

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
